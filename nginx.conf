upstream web {
    server web:8000;
}

server {
    listen 80;
    server_name ideasophia.com www.ideasophia.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ideasophia.com www.ideasophia.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/ideasophia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ideasophia.com/privkey.pem;

    # Upload & Timeout Settings
    client_max_body_size 20M;
    client_body_timeout 120s;
    send_timeout 120s;
    proxy_connect_timeout 120s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    proxy_request_buffering off;

    location / {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    # ============================================
    # ASTROBERRY REMOTE ACCESS
    # ============================================

    # noVNC Web Interface (VNC via browser)
    location /astroberry/vnc/ {
        proxy_pass http://novnc:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # WebSocket untuk noVNC
    location /astroberry/vnc/websockify {
        proxy_pass http://novnc:8080/websockify;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Astroberry Web Interface (via host)
    location /astroberry/web/ {
        proxy_pass http://host.docker.internal:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # INDI Server
    location /astroberry/indi/ {
        proxy_pass http://host.docker.internal:17624/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Status endpoint (Django)
    location /astroberry/status {
        proxy_pass http://web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}